<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREON</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0d12; color: #e2e8f0; font-family: 'IBM Plex Mono', monospace; }
    #app { display: grid; grid-template-columns: 260px 1fr 320px; height: 100vh; }
    #left-panel { border-right: 1px solid #1e293b; padding: 16px; overflow-y: auto; }
    #center-panel { overflow: hidden; }
    #right-panel { border-left: 1px solid #1e293b; padding: 16px; overflow-y: auto; }
  </style>
</head>
<body>
  <div id="app">
    <div id="left-panel">
      <h2>CREON</h2>
      <p>AI Labor Intelligence</p>
    </div>
    <div id="center-panel"></div>
    <div id="right-panel"></div>
  </div>
</body>
</html>
